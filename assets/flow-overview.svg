<svg viewBox="0 0 1280 420" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2c5f63"/>
    </marker>
    <marker id="arrg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9aa6b2"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="420" fill="#faf8f5"/>

  <!-- 入口 -->
  <rect x="36" y="168" width="148" height="84" rx="10" fill="#ffffff" stroke="#2c5f63" stroke-width="2"/>
  <text x="110" y="204" text-anchor="middle" font-size="19" font-weight="700" fill="#1f2937">你的 Skill</text>
  <text x="110" y="230" text-anchor="middle" font-size="12" fill="#6b7280">能用，但够好吗？</text>

  <!-- 分流 -->
  <path d="M184,210 L236,210" stroke="#2c5f63" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M252,210 L252,122 L296,122" stroke="#2c5f63" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M252,210 L252,300 L296,300" stroke="#2c5f63" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <circle cx="252" cy="210" r="5" fill="#2c5f63"/>

  <!-- ===== 查勘通道 ===== -->
  <rect x="298" y="76" width="200" height="92" rx="10" fill="#eef6f5" stroke="#2c5f63" stroke-width="2"/>
  <text x="398" y="110" text-anchor="middle" font-size="18" font-weight="700" fill="#2c5f63">查勘 · 快检档</text>
  <text x="398" y="134" text-anchor="middle" font-size="12" fill="#475569">10 分钟 · 全程只读</text>
  <text x="398" y="152" text-anchor="middle" font-size="12" fill="#475569">不动你任何文件</text>

  <path d="M498,122 L552,122" stroke="#2c5f63" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="554" y="76" width="216" height="92" rx="10" fill="#ffffff" stroke="#b07d48" stroke-width="2"/>
  <text x="662" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#8a5a28">一页体检报告</text>
  <text x="662" y="132" text-anchor="middle" font-size="12" fill="#475569">九维评分（附证据行号）</text>
  <text x="662" y="150" text-anchor="middle" font-size="12" fill="#475569">P0/P1 清单 + 一句话建议</text>

  <!-- 想认真修 → 直连⑥细作 -->
  <path d="M770,122 L1010,122 Q1026,122 1026,140 L1026,264" stroke="#9aa6b2" stroke-width="2" stroke-dasharray="6,5" fill="none" marker-end="url(#arrg)"/>
  <text x="800" y="110" font-size="12" fill="#6b7280">想认真修 → 直入大修⑥细作</text>

  <!-- ===== 大修工序带 ===== -->
  <text x="298" y="262" font-size="13" font-weight="700" fill="#8a5a28" letter-spacing="2">大修 · 精装档 —— 七步工序</text>

  <!-- 七卡 x: 298 + i*132, w120 h96, y=276 -->
  <!-- ① -->
  <g>
    <rect x="298" y="276" width="120" height="96" rx="9" fill="#ffffff" stroke="#2c5f63" stroke-width="1.6"/>
    <circle cx="316" cy="294" r="11" fill="#2c5f63"/><text x="316" y="299" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">①</text>
    <text x="358" y="318" text-anchor="middle" font-size="17" font-weight="700" fill="#1f2937">相地</text>
    <text x="358" y="340" text-anchor="middle" font-size="11.5" fill="#6b7280">立项审查</text>
    <text x="358" y="358" text-anchor="middle" font-size="10.5" fill="#94a3b8">值不值得修</text>
  </g>
  <path d="M418,324 L428,324" stroke="#2c5f63" stroke-width="2" marker-end="url(#arr)"/>
  <!-- ② -->
  <g>
    <rect x="430" y="276" width="120" height="96" rx="9" fill="#ffffff" stroke="#2c5f63" stroke-width="1.6"/>
    <circle cx="448" cy="294" r="11" fill="#2c5f63"/><text x="448" y="299" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">②</text>
    <text x="490" y="318" text-anchor="middle" font-size="17" font-weight="700" fill="#1f2937">访例</text>
    <text x="490" y="340" text-anchor="middle" font-size="11.5" fill="#6b7280">同类调研</text>
    <text x="490" y="358" text-anchor="middle" font-size="10.5" fill="#94a3b8">对标全带链接</text>
  </g>
  <path d="M550,324 L560,324" stroke="#2c5f63" stroke-width="2" marker-end="url(#arr)"/>
  <!-- ③ -->
  <g>
    <rect x="562" y="276" width="120" height="96" rx="9" fill="#ffffff" stroke="#2c5f63" stroke-width="1.6"/>
    <circle cx="580" cy="294" r="11" fill="#2c5f63"/><text x="580" y="299" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">③</text>
    <text x="622" y="318" text-anchor="middle" font-size="17" font-weight="700" fill="#1f2937">定式</text>
    <text x="622" y="340" text-anchor="middle" font-size="11.5" fill="#6b7280">生态定位</text>
    <text x="622" y="358" text-anchor="middle" font-size="10.5" fill="#94a3b8">一句话生态位</text>
  </g>
  <path d="M682,324 L692,324" stroke="#2c5f63" stroke-width="2" marker-end="url(#arr)"/>
  <!-- ④ -->
  <g>
    <rect x="694" y="276" width="120" height="96" rx="9" fill="#ffffff" stroke="#2c5f63" stroke-width="1.6"/>
    <circle cx="712" cy="294" r="11" fill="#2c5f63"/><text x="712" y="299" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">④</text>
    <text x="754" y="318" text-anchor="middle" font-size="17" font-weight="700" fill="#1f2937">勘验</text>
    <text x="754" y="340" text-anchor="middle" font-size="11.5" fill="#6b7280">九维评分</text>
    <text x="754" y="358" text-anchor="middle" font-size="10.5" fill="#94a3b8">独立评委盲评</text>
  </g>
  <path d="M814,324 L824,324" stroke="#2c5f63" stroke-width="2" marker-end="url(#arr)"/>
  <!-- ⑤ -->
  <g>
    <rect x="826" y="276" width="120" height="96" rx="9" fill="#ffffff" stroke="#2c5f63" stroke-width="1.6"/>
    <circle cx="844" cy="294" r="11" fill="#2c5f63"/><text x="844" y="299" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">⑤</text>
    <text x="886" y="318" text-anchor="middle" font-size="17" font-weight="700" fill="#1f2937">画样</text>
    <text x="886" y="340" text-anchor="middle" font-size="11.5" fill="#6b7280">差距规划</text>
    <text x="886" y="358" text-anchor="middle" font-size="10.5" fill="#94a3b8">P0/P1/P2 分级</text>
  </g>
  <path d="M946,324 L956,324" stroke="#2c5f63" stroke-width="2" marker-end="url(#arr)"/>
  <!-- ⑥ 细作（核心，加重） -->
  <g>
    <rect x="958" y="270" width="126" height="108" rx="9" fill="#fdf6ee" stroke="#b07d48" stroke-width="2.4"/>
    <circle cx="977" cy="290" r="11" fill="#b07d48"/><text x="977" y="295" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">⑥</text>
    <text x="1021" y="316" text-anchor="middle" font-size="17" font-weight="700" fill="#8a5a28">细作</text>
    <text x="1021" y="338" text-anchor="middle" font-size="11.5" fill="#8a5a28">定向改写</text>
    <text x="1021" y="356" text-anchor="middle" font-size="10.5" fill="#b07d48">受控实验循环</text>
    <text x="1021" y="371" text-anchor="middle" font-size="10" fill="#b07d48">（见下图）</text>
  </g>
  <path d="M1084,324 L1094,324" stroke="#2c5f63" stroke-width="2" marker-end="url(#arr)"/>
  <!-- ⑦ -->
  <g>
    <rect x="1096" y="276" width="120" height="96" rx="9" fill="#ffffff" stroke="#c0392b" stroke-width="2"/>
    <circle cx="1114" cy="294" r="11" fill="#c0392b"/><text x="1114" y="299" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">⑦</text>
    <text x="1156" y="318" text-anchor="middle" font-size="17" font-weight="700" fill="#c0392b">落成</text>
    <text x="1156" y="340" text-anchor="middle" font-size="11.5" fill="#6b7280">验收交付</text>
    <text x="1156" y="358" text-anchor="middle" font-size="10.5" fill="#94a3b8">报告 + 落成匾</text>
  </g>

  <!-- 岁修回环 -->
  <path d="M1156,276 L1156,232 Q1156,218 1142,218 L420,218" stroke="#9aa6b2" stroke-width="2" stroke-dasharray="6,5" fill="none" marker-end="url(#arrg)"/>
  <rect x="560" y="196" width="270" height="34" rx="17" fill="#f1efe9" stroke="#9aa6b2" stroke-width="1.4"/>
  <text x="695" y="218" text-anchor="middle" font-size="12.5" font-weight="600" fill="#475569">岁修周期：台账满 5 个 → 用自己大修自己</text>
</svg>
